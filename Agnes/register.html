<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes - Registro</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo-favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/442be68600.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="components/css/styles.css">
</head>

<body id="login">
    <!-- Header Start -->
    <nav class="navbar navbar-expand-lg position-absolute top-0 py-3 py-lg-3 px-lg-5 col-12">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img id="logo" src="assets/logo-agnes-final-branca.png" alt="Logo Agnes">
            </a>
            <div class="offcanvas offcanvas-end bg-dark" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header" data-bs-theme="dark">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                        <img id="logo" src="assets/logo-agnes-final-branca.png" alt="Logo Agnes">
                    </h5>
                    <button type="button" class='btn-close data-bs-theme="dark"' data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center fixed flex-grow-1 pe-3 me-5">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle mx-lg-2 fs-4" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Produtos
                            </a>
                            <ul class="dropdown-menu" data-bs-theme="dark">
                                <li><a class="dropdown-item" href="#">Action</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Another Action</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2 fs-4" aria-current="page" href="#">Contato</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2 fs-4" href="#">Fazer Login</a>
                        </li>
                    </ul>
                </div>
            </div>
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <!-- Header End-->
    <div class="triangle-bottomleft"></div>
    <div class="container d-flex justify-content-left align-items-center min-vh-100">
        <div class="row border rounded-3 p-3 bg-white shadow-lg box-area justify-content-center align-items-center">
            <div class="col-md-6 d-flex justify-content-center align-items-center flex-column left-box">
                <h1 class="text-black mb-3" style="font-size: 50pt">Cadastre-se</h1>
                <form id="registerForm" onsubmit="event.preventDefault(); createUser();">
                    <div class="input-group mb-3">
                        <input id="nome_usuario" type="text" class="form-control form-control-lg" placeholder="Nome de usuário" required>
                    </div>
                    <div class="input-group mb-3">
                        <input id="email_usuario" type="email" class="form-control form-control-lg" placeholder="E-mail" required>
                    </div>
                    <div class="input-group mb-3">
                        <input id="senha_usuario" type="password" class="form-control form-control-lg" placeholder="Escolha uma senha" required>
                    </div>
                    <div class="input-group mb-2">
                        <input id="confirm_senha_usuario" type="password" class="form-control form-control-lg" placeholder="Confirme a senha" required>
                    </div>
                    <div class="input-group justify-content-center mb-3">
                        <button type="submit" class="btn btn-login rounded-3">Cadastrar</button>
                    </div>
                </form>
            </div>
            <div class="col-md-6 right-box">
                <div class="row align-items-center">
                    <div class="input-group mb-3 mt-4 align-items-center justify-content-center">
                        <button class="btn btn-google rounded-3"><img src="assets/google-logo.png" class="me-2"
                                style="width: 20px" alt="Google Logo">Entrar com Google</button>
                    </div>
                    <div class="input-group mb-3 align-items-center justify-content-center">
                        <button class="btn btn-github rounded-3"><img src="assets/github-logo.png" class="me-2"
                                alt="Github Logo">Entrar com Github</button>
                    </div>
                    <div class="input-group mb-3 mt-5 justify-content-center">
                        <p class="fs-5">Já tem uma conta? <a href="login.html" style="text-decoration: none; color: #4287f5">Log
                                in</a></p>
                    </div>
                </div>
            </div>
            <p class="text-secondary mt-2 mb-2"> *Ao se registrar, você concorda com nossos Termos de Uso e reconhece que leu
                nossa Política de Privacidade.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="components/js/cadastro.js"></script>
</body>

</html>
