<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo-favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="components/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">

</head>

<body id="aiform">
    <div class="form-container col-12 col-md-6 col-lg-4">
        <div class="logo-container">
            <a href="mainpage.html"><img src="/assets/logo-agnes-final-branca.png" alt="Logo Agnes"
                    class="img-fluid img-aiform mt-3"></a>
        </div>
        <form action="" id="questionForm" class="align-items-center">
            <div class="question mb-6" id="question1">
                <label for="answer1" id="answer" class="text-white">Qual seria a cor ideal para o seu site?</label>
                <input type="text" id="answer1" class="question-input" name="answer1" placeholder="..."
                    style="font-family: 'Martian Mono', monospace;">
            </div>
            <div class="question mb-6" id="question2">
                <label for="answer2" id="answer" class="text-white">Descreva o tipo do seu site.</label>
                <input type="text" id="answer2" class="question-input" name="answer2" placeholder="..."
                    style="font-family: 'Martian Mono', monospace;">
            </div>
            <div class="question mb-6" id="question3">
                <label for="answer3" id="answer" class="text-white">Por fim, qual o nome do seu site?</label>
                <input type="text" id="answer3" class="question-input" name="answer3" placeholder="..."
                    style="font-family: 'Martian Mono', monospace;">
            </div>
            <div class="question mb-6 mt-4" id="submit">
                <input type="submit" id="submit" name="submit" value="CONFIRMAR">
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script defer src="components/js/scriptform.js"></script>
    <script>
        document.getElementById('questionForm').addEventListener('submit', async function (event) {
            event.preventDefault(); // Impede o envio do formulário

            const answer1 = document.getElementById('answer1').value;
            const answer2 = document.getElementById('answer2').value;
            const answer3 = document.getElementById('answer3').value;

            // Criação do prompt para IA
            const prompt = `Crie um body de um site estilizado bonito e moderno com a Cor principal: ${ answer1 } com o tema: ${ answer2 } e com o nome Nome: ${ answer3} 

IMPORTANTE:  
- não coloque comentarios na resposta
- coloque id e a propriedade fixed em sections, footer e headers. 
- Caso precise inserir comentários, utilize o formato /**/ para não interferir no código final.`;
            /*
                responda somente com o codigo.
                */
            // Para verificar o conteúdo do prompt
            console.log('Prompt:', prompt);
            try {
                const response = await fetch("http://localhost:11434/api/generate", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "deepseek-coder-v2",
                        prompt: prompt,
                        stream: false,
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API response:', data.response.toString());
                localStorage.setItem('HTML', data.response);
                window.location.href = "devArea.html";
            } catch (error) {
                console.error('Fetch error:', error);
            }
        });
    </script>
</body>

</html>
